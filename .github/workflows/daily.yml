name: Daily Job Fetch + Score
# Épico 4.1 — roda seg-sex às 9h UTC (6h BRT)

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:  # permite rodar manualmente

jobs:
  fetch-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # necessário para o step "Commit results" fazer push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch jobs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python src/fetch.py
        # TODO: Épico 4.2 — retry 1x se falhar

      - name: Filter jobs
        run: python src/filter.py --date $(date +%Y-%m-%d)

      - name: Score jobs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/score.py
        # TODO: Épico 4.2 — retry 1x se falhar

      - name: Build frontend data
        run: python src/build_frontend_data.py

      - name: Copy jobs.json to docs for GitHub Pages
        run: mkdir -p docs/data && cp data/jobs.json docs/data/jobs.json

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/filtered/ data/scored/ data/seen_jobs.json data/jobs.json docs/data/
          git diff --cached --quiet || git commit -m "chore: vagas $(date +%Y-%m-%d)"
          git pull --rebase
          git push
        # TODO: Épico 4.2 — commit log de erro se pipeline falhar
