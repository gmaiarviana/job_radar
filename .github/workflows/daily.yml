name: Daily Job Fetch + Score
# Épico 4.1 — roda seg-sex às 9h UTC (6h BRT)

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:  # permite rodar manualmente

jobs:
  fetch-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch jobs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python src/fetch.py
        # TODO: Épico 4.2 — retry 1x se falhar

      - name: Score jobs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/score.py
        # TODO: Épico 4.2 — retry 1x se falhar

      - name: Notify PERFECT_MATCH
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python src/notify.py
        # TODO: Épico 4.3 — implementar notify.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/scored/
          git diff --cached --quiet || git commit -m "chore: vagas $(date +%Y-%m-%d)"
          git push
        # TODO: Épico 4.2 — commit log de erro se pipeline falhar
